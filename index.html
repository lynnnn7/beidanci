<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中文间隔遮挡工具（GitHub Pages版）</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        background: #f5f5f5;
    }
    textarea {
        width: 100%;
        height: 140px;
        font-size: 16px;
        padding: 10px;
        margin-bottom: 20px;
    }
    .buttons button {
        margin: 5px;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
    }
    .output {
        margin-top: 20px;
        padding: 15px;
        background: white;
        min-height: 60px;
        font-size: 20px;
        border: 1px solid #ccc;
        white-space: pre-wrap;
    }
</style>
</head>
<body>

<h2>中文间隔遮挡工具（GitHub Pages版）</h2>

<textarea id="inputText" placeholder="正在加载 1.txt..."></textarea>

<div class="buttons">
    <button onclick="setIntervalMask(1)">间隔1</button>
    <button onclick="setIntervalMask(2)">间隔2</button>
    <button onclick="setIntervalMask(3)">间隔3</button>
    <button onclick="setIntervalMask(4)">间隔4</button>
</div>

<div class="buttons">
    <button onclick="copyResult()">复制结果</button>
    <button onclick="exportTXT(false)">导出当前</button>
    <button onclick="exportTXT(true)">导出全部形态</button>
</div>

<div class="output" id="outputText"></div>

<script>
let currentInterval = 1;
let offset = 0;

// =======================
// 🔹 判断中文
// =======================
function isChinese(char) {
    return /[\u4e00-\u9fa5]/.test(char);
}

// =======================
// 🔹 核心生成
// =======================
function generateText(interval, off) {
    const input = document.getElementById("inputText").value;
    let result = "";
    let chineseIndex = 0;

    for (let char of input) {
        if (isChinese(char)) {
            if ((chineseIndex + off) % (2 * interval) < interval) {
                result += char;
            } else {
                result += "⬛️";
            }
            chineseIndex++;
        } else {
            result += char;
        }
    }
    return result;
}

function processText() {
    document.getElementById("outputText").innerText =
        generateText(currentInterval, offset);
}

// =======================
// 🔹 按钮逻辑
// =======================
function setIntervalMask(n) {
    if (currentInterval === n) {
        offset = (offset + 1) % (2 * n);
    } else {
        currentInterval = n;
        offset = 0;
    }
    processText();
}

// =======================
// 🔹 复制
// =======================
function copyResult() {
    const text = document.getElementById("outputText").innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("已复制！");
    });
}

// =======================
// 🔹 导出
// =======================
function exportTXT(allVariants) {
    let content = "";

    if (allVariants) {
        for (let i = 0; i < 2 * currentInterval; i++) {
            content += generateText(currentInterval, i) + "\n\n";
        }
    } else {
        content = generateText(currentInterval, offset);
    }

    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `mask_interval_${currentInterval}.txt`;
    link.click();
}

// =======================
// 🔹 自动加载 1.txt（关键）
// =======================
async function loadDefaultTXT() {
    try {
        const response = await fetch("./1.txt"); // ✅ GitHub Pages正确路径
        if (!response.ok) throw new Error("加载失败");

        const text = await response.text();
        document.getElementById("inputText").value = text;
        processText();
    } catch (e) {
        document.getElementById("inputText").value =
            "⚠️ 未找到 1.txt，请确认文件已上传到仓库根目录";
    }
}

// =======================
// 初始化
// =======================
document.getElementById("inputText").addEventListener("input", processText);

// 页面加载时执行
loadDefaultTXT();
</script>

</body>
</html>
